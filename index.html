<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Puzle Personalizado Pro</title>
    <style>
        :root {
            --bg-color: #F2F2F7;
            --accent-color: #007AFF;
            --text-main: #000000;
            --text-secondary: #8E8E93;
            --border-color: #D1D1D6;
            
            --grid-cols: 3;
            --grid-rows: 4;
            --base-unit: 85px; 
            --gap: 2px;
            --board-width: calc((var(--base-unit) * var(--grid-cols)) + (var(--gap) * (var(--grid-cols) - 1)));
            --board-height: calc((var(--base-unit) * var(--grid-rows)) + (var(--gap) * (var(--grid-rows) - 1)));
        }

        * { box-sizing: border-box; -webkit-touch-callout: none; user-select: none; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        header { padding: 20px; text-align: center; }
        h1 { margin: 0; font-size: 1.4rem; }

        #game-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Selector de Foto Inicial */
        #photo-selector {
            width: var(--board-width);
            height: var(--board-height);
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border-color);
            cursor: pointer;
        }

        #photo-selector svg { width: 50px; fill: var(--text-secondary); margin-bottom: 10px; }

        /* Tablero */
        #game-board {
            position: relative;
            width: var(--board-width);
            height: var(--board-height);
            background: #D1D1D6;
            border-radius: 8px;
            display: none;
            touch-action: none;
        }

        .tile {
            position: absolute;
            width: var(--base-unit);
            height: var(--base-unit);
            background-size: var(--board-width) var(--board-height);
            border-radius: 4px;
            cursor: grab;
        }

        .tile.dragging { z-index: 10; cursor: grabbing; opacity: 0.9; }
        .tile.snap-back { transition: transform 0.2s ease-out; }
        .tile.empty { visibility: hidden; }

        /* Controles */
        #controls {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: var(--board-width);
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-outline { background: white; color: var(--accent-color); border: 1px solid var(--accent-color); }
        
        #status { height: 20px; color: #34C759; font-weight: bold; margin-bottom: 10px; }
        #file-input { display: none; }

        @media (max-width: 380px) {
            :root { --base-unit: 75px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Puzle 4x3</h1>
        <div id="status"></div>
    </header>

    <div id="game-container">
        <input type="file" id="file-input" accept="image/*">
        
        <div id="photo-selector">
            <svg viewBox="0 0 24 24"><path d="M19,19H5V5H19M19,3H5A2,2 0 0,0 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3M13.96,12.29L11.21,15.83L9.25,13.47L6.5,17H17.5L13.96,12.29Z" /></svg>
            <span>Elegir de la Fototeca</span>
        </div>

        <div id="game-board"></div>
    </div>

    <div id="controls">
        <button id="shuffle-btn" class="btn btn-primary" style="display:none">Mezclar y Jugar</button>
        <button id="change-photo-btn" class="btn btn-outline" style="display:none">Cambiar Foto</button>
    </div>

    <script>
        const cols = 3, rows = 4, total = cols * rows;
        const board = document.getElementById('game-board');
        const selector = document.getElementById('photo-selector');
        const fileInput = document.getElementById('file-input');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const changeBtn = document.getElementById('change-photo-btn');
        const status = document.getElementById('status');

        let gameState = [], emptyIdx, img = null, unit, isPlaying = false;

        // --- Carga de Imagen ---
        selector.onclick = () => fileInput.click();
        
        changeBtn.onclick = () => {
            board.style.display = 'none';
            selector.style.display = 'flex';
            shuffleBtn.style.display = 'none';
            changeBtn.style.display = 'none';
            status.innerText = '';
            isPlaying = false;
        };

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                img = ev.target.result;
                startNewGame();
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function startNewGame() {
            selector.style.display = 'none';
            board.style.display = 'block';
            shuffleBtn.style.display = 'block';
            changeBtn.style.display = 'block';
            shuffleBtn.innerText = "Mezclar y Jugar";
            isPlaying = false;
            
            unit = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--base-unit'));
            gameState = Array.from({length: total}, (_, i) => i);
            emptyIdx = total - 1;
            render();
        }

        function render() {
            board.innerHTML = '';
            gameState.forEach((id, pos) => {
                const tile = document.createElement('div');
                tile.className = 'tile' + (id === total - 1 ? ' empty' : '');
                if (id !== total - 1) {
                    tile.style.backgroundImage = `url(${img})`;
                    const r = Math.floor(id / cols), c = id % cols;
                    tile.style.backgroundPosition = `-${c * (unit + 2)}px -${r * (unit + 2)}px`;
                    tile.onpointerdown = dragStart;
                }
                updatePos(tile, pos);
                tile.dataset.id = id;
                board.appendChild(tile);
            });
        }

        function updatePos(el, pos) {
            const r = Math.floor(pos / cols), c = pos % cols;
            el.style.transform = `translate(${c * (unit + 2)}px, ${r * (unit + 2)}px)`;
        }

        // --- Lógica de Arrastre ---
        let currTile, startX, startY, origX, origY;

        function dragStart(e) {
            if (!isPlaying) return;
            currTile = e.currentTarget;
            const pos = gameState.indexOf(parseInt(currTile.dataset.id));
            if (!isAdjacent(pos, emptyIdx)) return;

            currTile.classList.add('dragging');
            startX = e.clientX; startY = e.clientY;
            const matrix = new DOMMatrix(getComputedStyle(currTile).transform);
            origX = matrix.m41; origY = matrix.m42;

            currTile.setPointerCapture(e.pointerId);
            currTile.onpointermove = dragMove;
            currTile.onpointerup = dragEnd;
        }

        function dragMove(e) {
            const dx = e.clientX - startX, dy = e.clientY - startY;
            const pos = gameState.indexOf(parseInt(currTile.dataset.id));
            const c = pos % cols, r = Math.floor(pos / cols);
            const ec = emptyIdx % cols, er = Math.floor(emptyIdx / cols);

            let x = origX, y = origY;
            if (r === er) x = Math.max(Math.min(c, ec) * (unit + 2), Math.min(Math.max(c, ec) * (unit + 2), origX + dx));
            if (c === ec) y = Math.max(Math.min(r, er) * (unit + 2), Math.min(Math.max(r, er) * (unit + 2), origY + dy));
            
            currTile.style.transform = `translate(${x}px, ${y}px)`;
        }

        function dragEnd() {
            currTile.onpointermove = null;
            currTile.classList.remove('dragging');
            currTile.classList.add('snap-back');

            const matrix = new DOMMatrix(getComputedStyle(currTile).transform);
            const newC = Math.round(matrix.m41 / (unit + 2));
            const newR = Math.round(matrix.m42 / (unit + 2));
            const newIdx = newR * cols + newC;

            const oldIdx = gameState.indexOf(parseInt(currTile.dataset.id));
            if (newIdx === emptyIdx) {
                [gameState[oldIdx], gameState[emptyIdx]] = [gameState[emptyIdx], gameState[oldIdx]];
                emptyIdx = oldIdx;
                updatePos(currTile, newIdx);
                setTimeout(checkWin, 200);
            } else {
                updatePos(currTile, oldIdx);
            }
        }

        function isAdjacent(p1, p2) {
            const r1 = Math.floor(p1/cols), c1 = p1%cols, r2 = Math.floor(p2/cols), c2 = p2%cols;
            return Math.abs(r1-r2) + Math.abs(c1-c2) === 1;
        }

        // --- Juego ---
        shuffleBtn.onclick = () => {
            for(let i=0; i<200; i++) {
                const adj = [];
                if(emptyIdx >= cols) adj.push(emptyIdx - cols);
                if(emptyIdx < total - cols) adj.push(emptyIdx + cols);
                if(emptyIdx % cols !== 0) adj.push(emptyIdx - 1);
                if((emptyIdx + 1) % cols !== 0) adj.push(emptyIdx + 1);
                const next = adj[Math.floor(Math.random() * adj.length)];
                [gameState[emptyIdx], gameState[next]] = [gameState[next], gameState[emptyIdx]];
                emptyIdx = next;
            }
            isPlaying = true;
            status.innerText = '';
            render();
        };

        function checkWin() {
            if (gameState.every((v, i) => v === i)) {
                status.innerText = "¡Completado! 🎉";
                isPlaying = false;
                const empty = board.querySelector('.empty');
                empty.style.backgroundImage = `url(${img})`;
                empty.classList.remove('empty');
                empty.style.visibility = 'visible';
            }
        }
    </script>
</body>
</html>
