<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deslizador Pro - Gemini</title>
    <style>
        :root {
            --bg-color: #111827;
            --tile-bg: #1f293a;
            --accent: #60a5fa;
            --text: #f3f4f6;
            --board-size: 360px; /* Tamaño base para escritorio, se ajusta en móvil */
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Crucial para el arrastre en móvil */
        }

        h1 { margin: 0 0 10px 0; font-size: 1.4rem; font-weight: 300; letter-spacing: 1px;}
        span.highlight { color: var(--accent); font-weight: bold; }

        #game-area {
            position: relative;
            width: var(--board-size);
            height: var(--board-size);
            background: #000;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        .tile {
            position: absolute;
            background-image: url('https://images.unsplash.com/photo-1599672624237-944216b5f939?q=80&w=600&auto=format&fit=crop');
            background-size: var(--board-size) var(--board-size);
            border-radius: 6px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
            transition: box-shadow 0.2s;
            cursor: grab;
            /* La transición de transform se activa SOLO cuando no estamos arrastrando */
        }

        .tile.dragging {
            cursor: grabbing;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 10;
            transition: none !important; /* Movimiento instantáneo al arrastrar */
        }

        .tile.snap-back {
            transition: transform 0.2s ease-out; /* Animación al soltar */
        }

        .tile.empty {
            visibility: hidden;
        }

        #ui {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        button {
            padding: 10px 25px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent);
            color: var(--bg-color);
        }

        #status {
            font-size: 1.1rem;
            height: 1.2rem;
            color: #4ade80;
        }

        /* Ajustes para pantallas pequeñas (Móvil) */
        @media (max-width: 400px) {
            :root {
                --board-size: 85vw; /* 85% del ancho de la ventana */
            }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <h1>Puzle <span class="highlight">Abstract Geometric</span></h1>
    
    <div id="game-area">
        </div>

    <div id="ui">
        <div id="status"></div>
        <button id="shuffle-btn">Mezclar y Jugar</button>
    </div>

    <script>
        const gridCount = 3; // 3x
