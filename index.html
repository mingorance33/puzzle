<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gemini Sliding Puzzle</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1 { margin-bottom: 10px; font-size: 1.5rem; color: var(--accent-color); }

        #game-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            background: #1e293b;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .tile {
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=400&q=80');
            background-size: 300% 300%;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .tile.empty {
            background: transparent !important;
            cursor: default;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        #controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
            color: #4ade80;
            height: 20px;
        }
    </style>
</head>
<body>

    <h1>Gemini Puzzle Art</h1>
    
    <div id="game-container"></div>

    <div id="message"></div>

    <div id="controls">
        <button onclick="shuffle()">Mezclar</button>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const messageDiv = document.getElementById('message');
        let tiles = [0, 1, 2, 3, 4, 5, 6, 7, 8]; // 8 es el hueco vacío
        const size = 3;

        function createBoard() {
            container.innerHTML = '';
            tiles.forEach((tileIndex, position) => {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                
                if (tileIndex === 8) {
                    tile.classList.add('empty');
                } else {
                    // Calcular posición de la imagen de fondo
                    const row = Math.floor(tileIndex / size);
                    const col = tileIndex % size;
                    tile.style.backgroundPosition = `${(col * 50)}% ${(row * 50)}%`;
                    
                    // Evento de clic/toque
                    tile.addEventListener('click', () => moveTile(position));
                }
                
                container.appendChild(tile);
            });
            checkWin();
        }

        function moveTile(pos) {
            const emptyPos = tiles.indexOf(8);
            const row = Math.floor(pos / size);
            const col = pos % size;
            const emptyRow = Math.floor(emptyPos / size);
            const emptyCol = emptyPos % size;

            // Verificar si está al lado (horizontal o vertical)
            const isAdjacent = (Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
                              (Math.abs(col - emptyCol) === 1 && row === emptyRow);

            if (isAdjacent) {
                // Intercambiar posiciones
                [tiles[pos], tiles[emptyPos]] = [tiles[emptyPos], tiles[pos]];
                createBoard();
            }
        }

        function shuffle() {
            messageDiv.innerText = "";
            // Mezcla simple aleatoria (se asegura de que sea posible resolverlo con swaps)
            for (let i = 0; i < 100; i++) {
                const emptyPos = tiles.indexOf(8);
                const neighbors = [];
                const row = Math.floor(emptyPos / size);
                const col = emptyPos % size;

                if (row > 0) neighbors.push(emptyPos - size);
                if (row < size - 1) neighbors.push(emptyPos + size);
                if (col > 0) neighbors.push(emptyPos - 1);
                if (col < size - 1) neighbors.push(emptyPos + 1);

                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                [tiles[emptyPos], tiles[randomNeighbor]] = [tiles[randomNeighbor], tiles[emptyPos]];
            }
            createBoard();
        }

        function checkWin() {
            const isWin = tiles.every((tile, index) => tile === index);
            if (isWin && messageDiv.innerText === "") {
                const emptyTile = document.querySelector('.empty');
                if(emptyTile) {
                     messageDiv.innerText = "¡Lo lograste! 🎉";
                }
            }
        }

        // Iniciar juego
        createBoard();
    </script>
</body>
</html>
