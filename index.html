<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deslizador Pro - Gemini</title>
    <style>
        :root {
            --bg-color: #111827;
            --tile-bg: #1f293a;
            --accent: #60a5fa;
            --text: #f3f4f6;
            --board-size: 360px; /* Tamaño base para escritorio, se ajusta en móvil */
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Crucial para el arrastre en móvil */
        }

        h1 { margin: 0 0 10px 0; font-size: 1.4rem; font-weight: 300; letter-spacing: 1px;}
        span.highlight { color: var(--accent); font-weight: bold; }

        #game-area {
            position: relative;
            width: var(--board-size);
            height: var(--board-size);
            background: #000;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        .tile {
            position: absolute;
            background-image: url('https://images.unsplash.com/photo-1599672624237-944216b5f939?q=80&w=600&auto=format&fit=crop');
            background-size: var(--board-size) var(--board-size);
            border-radius: 6px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
            transition: box-shadow 0.2s;
            cursor: grab;
            /* La transición de transform se activa SOLO cuando no estamos arrastrando */
        }

        .tile.dragging {
            cursor: grabbing;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 10;
            transition: none !important; /* Movimiento instantáneo al arrastrar */
        }

        .tile.snap-back {
            transition: transform 0.2s ease-out; /* Animación al soltar */
        }

        .tile.empty {
            visibility: hidden;
        }

        #ui {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        button {
            padding: 10px 25px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent);
            color: var(--bg-color);
        }

        #status {
            font-size: 1.1rem;
            height: 1.2rem;
            color: #4ade80;
        }

        /* Ajustes para pantallas pequeñas (Móvil) */
        @media (max-width: 400px) {
            :root {
                --board-size: 85vw; /* 85% del ancho de la ventana */
            }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <h1>Puzle <span class="highlight">Abstract Geometric</span></h1>
    
    <div id="game-area">
        </div>

    <div id="ui">
        <div id="status"></div>
        <button id="shuffle-btn">Mezclar y Jugar</button>
    </div>

    <script>
        const gridCount = 3; // 3x3
        const gameArea = document.getElementById('game-area');
        const statusDiv = document.getElementById('status');
        const shuffleBtn = document.getElementById('shuffle-btn');

        let tileSize;
        let tilesCount = gridCount * gridCount;
        let gameState = []; // Guarda el índice de la pieza en cada posición [0,1,2...]
        let isDragging = false;
        let currentTile = null;
        let dragStartX, dragStartY;
        let tileStartX, tileStartY;
        let emptyPos; // {row, col}
        let puzzleSolved = false;

        // --- Inicialización ---
        function initGame() {
            calculateSizes();
            createInitialState();
            renderTiles();
            shuffleBtn.addEventListener('click', shuffle);
            window.addEventListener('resize', onResize);
        }

        function calculateSizes() {
            const areaWidth = gameArea.clientWidth;
            tileSize = areaWidth / gridCount;
        }

        function onResize() {
            calculateSizes();
            // Actualizar el tamaño de background y posición de todas las piezas existentes
            const uiTiles = document.querySelectorAll('.tile');
            uiTiles.forEach(uiTile => {
                const id = parseInt(uiTile.dataset.id);
                uiTile.style.width = `${tileSize}px`;
                uiTile.style.height = `${tileSize}px`;
                uiTile.style.backgroundSize = `${gameArea.clientWidth}px ${gameArea.clientWidth}px`;
                if (!uiTile.classList.contains('dragging')) {
                    const pos = gameState.indexOf(id);
                    updateTilePositionDOM(uiTile, pos);
                }
            });
        }

        function createInitialState() {
            gameState = Array.from({length: tilesCount}, (_, i) => i);
            emptyPos = {row: gridCount - 1, col: gridCount - 1}; // Última celda vacía
        }

        function renderTiles() {
            gameArea.innerHTML = ''; // Limpiar
            for (let i = 0; i < tilesCount; i++) {
                const tileId = gameState[i];
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.dataset.id = tileId; // ID único de la pieza (0 a 8)
                tile.style.width = `${tileSize}px`;
                tile.style.height = `${tileSize}px`;

                if (tileId === tilesCount - 1) {
                    tile.classList.add('empty');
                } else {
                    // Calcular qué parte de la imagen va aquí
                    const correctRow = Math.floor(tileId / gridCount);
                    const correctCol = tileId % gridCount;
                    const bgX = correctCol * tileSize;
                    const bgY = correctRow * tileSize;
                    tile.style.backgroundPosition = `-${bgX}px -${bgY}px`;
                    
                    // Asignar posición visual inicial
                    updateTilePositionDOM(tile, i);

                    // Eventos de arrastre (Pointer Events manejan ratón y toque)
                    tile.addEventListener('pointerdown', onPointerDown);
                }
                gameArea.appendChild(tile);
            }
        }

        // --- Lógica de Posicionamiento ---
        function getGridPos(index) {
            return {
                row: Math.floor(index / gridCount),
                col: index % gridCount
            };
        }

        function updateTilePositionDOM(tileEl, index) {
            const {row, col} = getGridPos(index);
            const x = col * tileSize;
            const y = row * tileSize;
            tileEl.style.transform = `translate(${x}px, ${y}px)`;
        }

        // --- Lógica del Arrastre (Drag & Drop) ---
        function onPointerDown(e) {
            if (puzzleSolved || isDragging) return;

            const tile = e.currentTarget;
            const tileId = parseInt(tile.dataset.id);
            const currentPos = gameState.indexOf(tileId);
            const gridPos = getGridPos(currentPos);

            // Verificar si es adyacente al hueco
            const isMovable = (Math.abs(gridPos.row - emptyPos.row) === 1 && gridPos.col === emptyPos.col) ||
                              (Math.abs(gridPos.col - emptyPos.col) === 1 && gridPos.row === emptyPos.row);

            if (!isMovable) return;

            isDragging = true;
            currentTile = tile;
            currentTile.classList.add('dragging');
            currentTile.classList.remove('snap-back');

            dragStartX = e.clientX;
            dragStartY = e.clientY;

            // Obtener la posición 'translate' actual
            const matrix = new DOMMatrix(window.getComputedStyle(currentTile).transform);
            tileStartX = matrix.m41;
            tileStartY = matrix.m42;

            // Capturar el puntero para que siga arrastrando aunque salga de la pieza
            currentTile.setPointerCapture(e.pointerId);
            currentTile.addEventListener('pointermove', onPointerMove);
            currentTile.addEventListener('pointerup', onPointerUp);
            currentTile.addEventListener('pointercancel', onPointerUp);
        }

        function onPointerMove(e) {
            if (!isDragging || !currentTile) return;

            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;

            const tileId = parseInt(currentTile.dataset.id);
            const currentPos = gameState.indexOf(tileId);
            const gridPos = getGridPos(currentPos);

            let finalX = tileStartX;
            let finalY = tileStartY;

            // Restringir el movimiento: solo hacia el hueco vacío
            if (gridPos.row === emptyPos.row) {
                // Movimiento Horizontal
                const minX = Math.min(gridPos.col, emptyPos.col) * tileSize;
                const maxX = Math.max(gridPos.col, emptyPos.col) * tileSize;
                finalX = Math.max(minX, Math.min(maxX, tileStartX + dx));
            } else if (gridPos.col === emptyPos.col) {
                // Movimiento Vertical
                const minY = Math.min(gridPos.row, emptyPos.row) * tileSize;
                const maxY = Math.max(gridPos.row, emptyPos.row) * tileSize;
                finalY = Math.max(minY, Math.min(maxY, tileStartY + dy));
            }

            currentTile.style.transform = `translate(${finalX}px, ${finalY}px)`;
        }

        function onPointerUp(e) {
            if (!isDragging || !currentTile) return;

            currentTile.removeEventListener('pointermove', onPointerMove);
            currentTile.removeEventListener('pointerup', onPointerUp);
            currentTile.classList.remove('dragging');
            currentTile.classList.add('snap-back'); // Activar animación de ajuste

            const tileId = parseInt(currentTile.dataset.id);
            const currentIndex = gameState.indexOf(tileId);
            
            // Calcular dónde soltó (en términos de cuadrícula)
            const matrix = new DOMMatrix(window.getComputedStyle(currentTile).transform);
            const releasedCol = Math.round(matrix.m41 / tileSize);
            const releasedRow = Math.round(matrix.m42 / tileSize);
            const releasedIndex = releasedRow * gridCount + releasedCol;

            // Verificar si el "ajuste" es al hueco vacío
            const emptyIndex = emptyPos.row * gridCount + emptyPos.col;

            if (releasedIndex === emptyIndex) {
                // MOVIMIENTO CONFIRMADO
                // Actualizar Estado
                gameState[emptyIndex] = tileId;
                gameState[currentIndex] = tilesCount - 1; // El hueco ahora está donde estaba la pieza
                
                // Actualizar emptyPos visual
                emptyPos = getGridPos(currentIndex);
                
                // Ajustar visualmente a la nueva celda
                updateTilePositionDOM(currentTile, emptyIndex);
                
                setTimeout(checkWin, 250); // Comprobar victoria después de la animación
            } else {
                // Volver a la posición original
                updateTilePositionDOM(currentTile, currentIndex);
            }

            isDragging = false;
            currentTile = null;
        }

        // --- Mezcla y Victoria ---
        function shuffle() {
            puzzleSolved = false;
            statusDiv.innerText = "";
            
            // Mezcla aleatoria pero resoluble
            for (let i = 0; i < 200; i++) {
                const movableIndices = [];
                // Encontrar piezas adyacentes al hueco
                const emptyIdx = emptyPos.row * gridCount + emptyPos.col;

                if (emptyPos.row > 0) movableIndices.push(emptyIdx - gridCount); // Arriba
                if (emptyPos.row < gridCount - 1) movableIndices.push(emptyIdx + gridCount); // Abajo
                if (emptyPos.col > 0) movableIndices.push(emptyIdx - 1); // Izquierda
                if (emptyPos.col < gridCount - 1) movableIndices.push(emptyIdx + 1); // Derecha

                const randIdx = movableIndices[Math.floor(Math.random() * movableIndices.length)];
                
                // Intercambiar en el estado
                [gameState[emptyIdx], gameState[randIdx]] = [gameState[randIdx], gameState[emptyIdx]];
                // Actualizar posición del hueco
                emptyPos = getGridPos(randIdx);
            }

            // Re-renderizar todo en sus nuevas posiciones
            renderTiles();
        }

        function checkWin() {
            let win = true;
            for (let i = 0; i < tilesCount; i++) {
                if (gameState[i] !== i) {
                    win = false;
                    break;
                }
            }
            if (win) {
                puzzleSolved = true;
                statusDiv.innerText = "¡Excelente! Imagen completada.";
                // Mostrar la pieza que faltaba (opcional)
                document.querySelector('.tile.empty').style.visibility = 'visible';
            }
        }

        // Arrancar
        window.onload = initGame;

    </script>
</body>
</html>
